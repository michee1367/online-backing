spring:
  application:
    name: compliance-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:villagesat}
    username: ${DB_USER:villagesat}
    password: ${DB_PASSWORD:villagesat_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: compliance
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: compliance
    default-schema: compliance
    table: flyway_compliance_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/villagesat}

server:
  port: 8087

villagesat:
  compliance:
    encryption-key: ${COMPLIANCE_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}
    auto-approve-threshold: 0.95
    manual-review-threshold: 0.70
    auto-reject-threshold: 0.40

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
