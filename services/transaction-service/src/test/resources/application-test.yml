spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  kafka:
    listener:
      auto-startup: false
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

villagesat:
  internal-service-token: test-internal-token
  security:
    oauth2:
      enabled: false
  wallet-service:
    url: http://localhost:8083
  fraud-service:
    url: http://localhost:8088
    timeout-ms: 200
