spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:villagesat}
    username: ${DB_USER:villagesat}
    password: ${DB_PASSWORD:villagesat_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: payments
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: payments
    default-schema: payments
    table: flyway_payment_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/villagesat}

villagesat:
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
  services:
    wallet-url: ${WALLET_SERVICE_URL:http://localhost:8083/api/v1/wallets}
    transaction-url: ${TRANSACTION_SERVICE_URL:http://localhost:8084/api/v1/transactions}

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.villagesat: INFO
  pattern:
    console: '{"timestamp":"%d","level":"%p","traceId":"%X{traceId}","service":"payment-service","msg":"%m"}%n'
