spring:
  application:
    name: user-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:villagesat}
    username: ${DB_USER:villagesat}
    password: ${DB_PASSWORD:villagesat_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: users
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: users
    default-schema: users
    table: flyway_user_history
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/villagesat}

server:
  port: 8082

villagesat:
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
  keycloak:
    server-url: ${KEYCLOAK_URL:http://localhost:8180}
    realm: villagesat
    admin-client-id: villagesat-service
    admin-client-secret: ${KEYCLOAK_ADMIN_SECRET:service-client-secret-change-in-prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    validate-on-migrate: false
