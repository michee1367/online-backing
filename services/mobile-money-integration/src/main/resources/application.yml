spring:
  application:
    name: mobile-money-integration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:villagesat}
    username: ${DB_USER:villagesat}
    password: ${DB_PASSWORD:villagesat_secret}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: mobile_money
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: mobile_money
    default-schema: mobile_money
    table: flyway_mobilemoney_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: mobile-money-integration
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/villagesat}

villagesat:
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
  services:
    wallet-url: ${WALLET_SERVICE_URL:http://localhost:8083/realms/api/v1/wallets}
    transaction-url: ${TRANSACTION_SERVICE_URL:http://localhost:8084/realms/villagesat}

server:
  port: 8092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  retry:
    instances:
      walletApiRetry:
        maxAttempts: 3          # Change à 5 si tu préfères 5 tentatives
        waitDuration: 2s         # Attend 2 secondes entre chaque tentative
        enableExponentialBackoff: true # Augmente intelligemment le temps d'attente (2s, 4s, 8s...)
        exponentialBackoffMultiplier: 2
        retryExceptions:         # On ne réessaie que si c'est un problème technique/réseau
          - org.springframework.web.client.HttpServerErrorException # Erreurs 5xx (serveur)
          - org.springframework.web.client.ResourceAccessException   # Timeouts / Réseau planté
        ignoreExceptions:        # On NE réessaie PAS si c'est une erreur de logique métier
          - org.springframework.web.client.HttpClientErrorException # Erreurs 4xx (Solde insuffisant 400, etc.)
app:
  services:
    wallet-url: http://localhost:8081/api/v1/wallets #

logging:
  level:
    com.villagesat: INFO
  pattern:
    console: '{"timestamp":"%d","level":"%p","traceId":"%X{traceId}","service":"mobile-money-integration","msg":"%m"}%n'


# ===================================================================
# SECTION PROFIL DEV (Surcharges appliquées UNIQUEMENT si le profil dev est actif)
# ===================================================================
---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.vectraxis: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.access: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n" # Remplacement par un format lisible en dev