global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: wallet-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8086"]

  - job_name: compliance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8087"]

  - job_name: fraud-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8088"]

  - job_name: admin-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8089"]

  - job_name: reporting-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8090"]

  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8091"]

  - job_name: mobile-money-integration
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8092"]

  - job_name: banking-integration
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8093"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
