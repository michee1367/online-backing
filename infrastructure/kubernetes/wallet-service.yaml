apiVersion: v1
kind: Namespace
metadata:
  name: villagesat
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: villagesat
  labels:
    app: wallet-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wallet-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: wallet-service
        version: v1
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "wallet-service"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/villagesat/wallet/db"
    spec:
      serviceAccountName: wallet-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: wallet-service
          image: ghcr.io/villagesat/wallet-service:latest
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: wallet-db-credentials
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-db-credentials
                  key: password
            - name: REDIS_HOST
              value: redis-cluster.villagesat.svc.cluster.local
            - name: KAFKA_BOOTSTRAP
              value: kafka.villagesat.svc.cluster.local:9092
            - name: KEYCLOAK_ISSUER
              value: https://auth.villagesat.com/realms/villagesat
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: villagesat
spec:
  selector:
    app: wallet-service
  ports:
    - port: 8083
      targetPort: 8083
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wallet-service-hpa
  namespace: villagesat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wallet-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wallet-service-policy
  namespace: villagesat
spec:
  podSelector:
    matchLabels:
      app: wallet-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: transaction-service
      ports:
        - port: 8083
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
